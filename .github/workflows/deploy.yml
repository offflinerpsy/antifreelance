name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro project
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 89.23.96.192 >> ~/.ssh/known_hosts

      - name: Prepare server
        run: |
          ssh -i ~/.ssh/id_rsa root@89.23.96.192 \
            "DEBIAN_FRONTEND=noninteractive apt-get update -qq && \
             DEBIAN_FRONTEND=noninteractive apt-get install -y -qq nginx && \
             systemctl enable nginx && \
             systemctl start nginx && \
             mkdir -p /var/www/antifreelance/client && \
             mkdir -p /var/www/antifreelance/server && \
             command -v node || (curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs) && \
             command -v pm2 || npm install -g pm2"

      - name: Deploy static files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./dist/client/ root@89.23.96.192:/var/www/antifreelance/client/

      - name: Deploy server files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./dist/server/ root@89.23.96.192:/var/www/antifreelance/server/

      - name: Deploy nginx config
        run: |
          scp -i ~/.ssh/id_rsa \
            .github/nginx.conf root@89.23.96.192:/etc/nginx/sites-available/antifreelance

      - name: Configure and start server
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          ssh -i ~/.ssh/id_rsa root@89.23.96.192 << 'ENDSSH'
            # Write env file
            cat > /var/www/antifreelance/server/.env << EOF
            HOST=127.0.0.1
            PORT=4321
            OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
          EOF

            # Enable nginx site
            ln -sf /etc/nginx/sites-available/antifreelance /etc/nginx/sites-enabled/antifreelance
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx

            # Start/restart Node server with PM2
            cd /var/www/antifreelance/server
            pm2 delete botstudio 2>/dev/null || true
            pm2 start entry.mjs --name botstudio --env production
            pm2 save
            pm2 startup systemd -u root --hp /root 2>/dev/null || true
          ENDSSH

      - name: Health check
        run: |
          sleep 5
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://aggressorbulkit.online)
          echo "HTTPS status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "HTTPS health check failed, trying HTTP fallback..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://89.23.96.192)
            echo "HTTP status: $STATUS"
            if [ "$STATUS" != "200" ] && [ "$STATUS" != "301" ]; then
              echo "Health check failed with status $STATUS"
              exit 1
            fi
          fi
          echo "Site is live at https://aggressorbulkit.online"
