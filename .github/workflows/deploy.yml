name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro project
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 89.23.96.192 >> ~/.ssh/known_hosts

      - name: Prepare server
        run: |
          ssh -i ~/.ssh/id_rsa root@89.23.96.192 \
            "DEBIAN_FRONTEND=noninteractive apt-get update -qq && \
             DEBIAN_FRONTEND=noninteractive apt-get install -y -qq nginx && \
             systemctl enable nginx && \
             systemctl start nginx && \
             mkdir -p /var/www/antifreelance"

      - name: Deploy files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./dist/ root@89.23.96.192:/var/www/antifreelance/
          scp -i ~/.ssh/id_rsa \
            .github/nginx.conf root@89.23.96.192:/etc/nginx/sites-available/antifreelance

      - name: Enable Nginx site
        run: |
          ssh -i ~/.ssh/id_rsa root@89.23.96.192 \
            "ln -sf /etc/nginx/sites-available/antifreelance /etc/nginx/sites-enabled/antifreelance && \
             rm -f /etc/nginx/sites-enabled/default && \
             nginx -t && \
             systemctl reload nginx"

      - name: Health check
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://89.23.96.192)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "✅ Site is live at http://89.23.96.192"
