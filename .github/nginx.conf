# ─── HTTPS: main site ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name aggressorbulkit.online;

    ssl_certificate     /etc/letsencrypt/live/aggressorbulkit.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aggressorbulkit.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/antifreelance/client;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Static assets — long cache
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp|woff2|woff|mp4)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # API routes → Node.js server
    location /api/ {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static pages
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}

# ─── HTTPS: www → non-www redirect ───────────────────────────────
server {
    listen 443 ssl http2;
    server_name www.aggressorbulkit.online;

    ssl_certificate     /etc/letsencrypt/live/aggressorbulkit.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aggressorbulkit.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://aggressorbulkit.online$request_uri;
}

# ─── HTTP → HTTPS redirect (all traffic) ─────────────────────────
server {
    listen 80;
    server_name aggressorbulkit.online www.aggressorbulkit.online 89.23.96.192;
    return 301 https://aggressorbulkit.online$request_uri;
}
